name: Tests
on: [push, pull_request]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npx vitest run

  e2e:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        if: ${{ env.PLAYWRIGHT_BASE_URL != '' }}
        run: npx playwright test
      - name: Skip e2e tests (STAGING_URL not set)
        if: ${{ env.PLAYWRIGHT_BASE_URL == '' }}
        run: echo "Skipping e2e tests — STAGING_URL secret is not configured."
